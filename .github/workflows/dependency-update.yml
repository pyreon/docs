name: Dependency Updates

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Check for updates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Update dependencies
        run: bun update

      - name: Install updated dependencies
        run: bun install

      - name: Typecheck with updated deps
        run: bun run typecheck

      - name: Lint with updated deps
        run: bun run lint

      - name: Build with updated deps
        run: bun run build

      - name: Create PR if changes exist
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update dependencies"
          title: "chore(deps): weekly dependency update"
          body: |
            Automated weekly dependency update.

            This PR updates all dependencies to their latest compatible versions.
            Typecheck, lint, and build passed with the updated dependencies.

            ---
            _Generated by the dependency-update workflow._
          branch: chore/dependency-update
          delete-branch: true
          labels: dependencies,automated
